<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Hola, soy Ariel</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { font-family: sans-serif; background: radial-gradient(ellipse at bottom, #050515 0%, #000 70%); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; position: relative; }
    canvas#starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .content { position: relative; z-index: 1; text-align: center; padding: 2rem; }
    h1 { font-size: 3rem; margin: 0.5rem 0; }
    p { font-size: 1.2rem; color: #ddd; margin: 0.25rem 0; }
    .leo { font-size: 1.4rem; color: #ffd86b; margin-top: 1rem; }
    a { color: #7c3aed; text-decoration: none; margin-top: 2rem; display: inline-block; }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>
  <div class="content">
    <div style="font-size:5rem">😊</div>
    <h1>¡Hola, soy Ariel!</h1>
    <p>Ingeniero — Comunidad FIUBA</p>
    <p class="leo">Hola soy Leo desde Salta, la tierra de Guemes y sus infernales</p>
    <a href="/">← Volver al taller</a>
  </div>

  <script>
  (function(){
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let w = 0, h = 0, stars = [];

    function resize(){
      const dpr = window.devicePixelRatio || 1;
      // reset transform to avoid cumulative scaling
      ctx.setTransform(1,0,0,1,0,0);
      w = canvas.width = Math.floor(window.innerWidth * dpr);
      h = canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.scale(dpr, dpr);
      initStars();
    }

    function initStars(){
      stars = [];
      const count = Math.max(100, Math.floor((window.innerWidth * window.innerHeight) / 8000));
      for(let i=0;i<count;i++){
        stars.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.6 + 0.2,
          baseAlpha: Math.random() * 0.8 + 0.2,
          alpha: Math.random(),
          speed: Math.random() * 0.02 + 0.002
        });
      }
    }

    function animate(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for(const s of stars){
        s.alpha += (Math.random() * 0.03 - 0.015) * s.speed * 60;
        if(s.alpha < 0) s.alpha = 0;
        if(s.alpha > 1) s.alpha = 1;
        ctx.beginPath();
        ctx.fillStyle = 'rgba(255,255,255,' + (s.baseAlpha * s.alpha).toFixed(3) + ')';
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    resize();
    animate();
  })();
  </script>
</body>
</html>
